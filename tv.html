<!DOCTYPE html>
<html>
  <head>
    <meta charset=“UTF-8”>
    <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
    <meta http-equiv=“X-UA-Compatible” content=“ie=edge”>
    <link rel="icon" type="image/x-icon" href="imgs/Test1.png">
    <style rel="stylesheet">
        body {
            background-color: #000000;
        }

        .container {
            position: absolute;
            width: 60%;
            height: 65%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        div#image::before {
            content:url("imgs/tv.png");
        }​

        .content {
            height: 100vh;
            display: grid;
            place-items: center;
            z-index: -1;
            position: relative;
        }

        .fuzz {
            position: absolute;
            width: 40%;
            height: 50%;
            top: 50%;
            left: 70%;
            transform: translate(-110%, -50%);
            z-index: -2;
            overflow: hidden;
            opacity: 0.5;
        }

        .videoplayer {
            position: absolute;
            width: 40%;
            height: 50%;
            top: 50%;
            left: 70%;
            transform: translate(-110%, -50%);
            z-index: -3;
            overflow: hidden;
            opacity: 0.8;            
        }
    </style>
    <title>TV</title>
  </head>

  <body>
    <script src="src/television.js">
    </script>
    
    <center>
        <div>
            <img src="imgs/tv.png" class="container"/>
            <img src="imgs/static.gif" class="fuzz"/>
            <video class="videoplayer" id="vhsplayer" controls>
                <source src="https://www.youtube.com/watch?v=rbHjoFTNIbE">
                Your browser does not support the video tag.
            </video>
        </div>
    </center>
  </body>
</html>
