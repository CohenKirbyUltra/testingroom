<!DOCTYPE html>
<html>
  <head>
    <meta charset=“UTF-8”>
    <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
    <meta http-equiv=“X-UA-Compatible” content=“ie=edge”>
    <link rel="icon" type="image/x-icon" href="imgs/Test1.png">
    <style rel="stylesheet">
        body {
            background-color: #000000;
        }

        .container {
            position: relative;
            width: 70%;
            height: 40%;
            z-index: 10;
        }

        div#image::before {
            content:url("imgs/tv.png");
        }​

        .content {
            height: 100vh;
            display: grid;
            place-items: center;
            z-index: -1;
            position: relative;
        }

        .fuzz {
            position: absolute;
            width: 50%;
            height: 40%;
            z-index: -2;
            overflow: hidden;
            opacity: 0.5;
        }
    </style>
    <title>TV</title>
  </head>

  <body>
    <script src="src/television.js">
    </script>
    
    <center>
        <div>
            <img src="imgs/tv.png" class="container"/>
            <img src="imgs/static.gif" class="fuzz"/>
        </div>

        <p></p>
    </center>
  </body>
</html>
