<html>
  <head>
    <style>
      body {
        background-color: black;
      }
    </style>
    <audio id="game" controls hidden>
      <source src="../audio/all-a-game.mp3" type="audio/mpeg">
    </audio>
  </head>
  <body>
    <center>
      <img id="findmeplease" width="100%" height="100%"/>
    </center>
    <script>
      var times = 0;
const tests = ["../imgs/Test1.png", "../imgs/Test2.png", "../imgs/Test3.png", "../imgs/Test4.png", "../imgs/Test5.png", "../imgs/Test6.png"];

update();

document.onvisibilitychange = () => {
    if (document.visibilityState === "hidden") {
        update();
    }
};
function update() {
    times++;
    switch(times) {
        case 1:
            document.getElementById("findmeplease").src = tests[0];
            break;
        case 2:
            document.getElementById("findmeplease").src = tests[1];
            break;
        case 3:
            document.getElementById("findmeplease").src = tests[2];
            break;
        case 4:
            document.getElementById("findmeplease").src = tests[3];
            break;
        case 5:
            document.getElementById("findmeplease").src = tests[4];
            break;
        case 6:
            document.getElementById("findmeplease").src = tests[5];
            PlayAudio();
            break;
        default:
            alert("...");
            break;
    }
}


function PlayAudio() {
    document.getElementById("game").play();
}

function preload_image(im_url) {
    let img = new Image();
    img.src = im_url;
}

tests.forEach(preload_image);
    </script>
  </body>
</html>
